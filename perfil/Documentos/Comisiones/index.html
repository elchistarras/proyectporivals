<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comisiones Artista</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">
    Mi Perfil de Comisiones
    <a href="carrito.html" class="cart-link">🛒 Carrito</a>
</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('commissions', this)">Commissions</div>
    <div class="tab" onclick="showTab('portfolio', this)">Portfolio</div>
</div>

<div class="container">

    <div id="commissions" class="section active">

        <div class="card">
            <img src="img/imagen1.jpg">
            <div class="card-info">
                <div class="card-title">Half Body</div>
                <div class="price" data-price="1200">$1200 MXN</div>

                <input type="number" min="1" value="1" class="qty">
                <button class="btn" onclick="addToCart('Half Body',1200,this)">Agregar</button>
            </div>
        </div>

       
        <div class="card">
            <img src="img/imagen2.jpg">
            <div class="card-info">
                <div class="card-title">Full Body</div>
                <div class="price">$2200 MXN</div>

                <input type="number" min="1" value="1" class="qty">
                <button class="btn" onclick="addToCart('Full Body',2200,this)">Agregar</button>
            </div>
        </div>

        <div class="card">
            <img src="img/imagen3.jpg">
            <div class="card-info">
                <div class="card-title">YCH Especial</div>
                <div class="price">$900 MXN</div>

                <input type="number" min="1" value="1" class="qty">
                <button class="btn" onclick="addToCart('YCH Especial',900,this)">Agregar</button>
            </div>
        </div>

    </div>

    <div id="portfolio" class="section">
        <div class="grid" id="portfolioGrid"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
