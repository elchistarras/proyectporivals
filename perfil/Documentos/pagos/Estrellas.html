<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recargas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-wrapper">
  <div class="frame">

    <div class="grid">
      <div class="card active" data-stars="3" data-price="3.00">
        <div class="stars">⭐ 3</div>
        <div class="price">$3.00</div>
      </div>

      <div class="card" data-stars="5" data-price="5.00">
        <div class="stars">⭐ 5</div>
        <div class="price">$5.00</div>
      </div>

      <div class="card" data-stars="10" data-price="10.00">
        <div class="stars">⭐ 10</div>
        <div class="price">$10.00</div>
      </div>
    </div>

    <h2 class="title">PRECIOS ESPECIALES</h2>

    <div class="grid">
      <div class="card" data-stars="20" data-price="15.00">
        <div class="stars">⭐ 20</div>
        <div class="price">$15.00</div>
      </div>

      <div class="card" data-stars="50" data-price="35.00">
        <div class="stars">⭐ 50</div>
        <div class="price">$35.00</div>
      </div>

      <div class="card" data-stars="100" data-price="59.99">
        <div class="stars">⭐ 100</div>
        <div class="price">$59.99</div>
      </div>
    </div>

    <div class="footer">
      <span id="selectedStars">⭐ 3</span>
      <button id="payBtn">Recargar por $3.00</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
