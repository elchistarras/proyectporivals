<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta — Rivals.gg</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red:      #FF2D2D;
            --red-dark: #C41A1A;
            --bg:       #0B0B0B;
            --bg2:      #111111;
            --bg3:      #161616;
            --text:     #F0EDE8;
            --muted:    #6B6460;
            --border:   #222;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Grid texture — igual que Base1 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                repeating-linear-gradient(0deg,  transparent, transparent 59px, #1a1a1a 60px),
                repeating-linear-gradient(90deg, transparent, transparent 59px, #1a1a1a 60px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }

        /* ── CARD ── */
        .register-container {
            position: relative;
            z-index: 1;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-top: 3px solid var(--red);
            border-radius: 2px;
            padding: 48px 44px 44px;
            width: 100%;
            max-width: 460px;
            animation: pgFadeIn 0.4s forwards;
        }

        @keyframes pgFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── LOGO ── */
        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
            justify-content: center;
        }

        .logo-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 0.1em;
            color: var(--text);
            line-height: 1;
        }

        .logo-name span { color: var(--red); }

        .logo-badge {
            background: var(--red);
            color: #fff;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.2em;
            padding: 3px 7px;
            border-radius: 2px;
        }

        /* ── HEADING ── */
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.6rem;
            letter-spacing: 0.04em;
            color: var(--text);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1;
        }

        /* ── FORM ── */
        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input::placeholder { color: var(--muted); }
        input:focus        { border-color: var(--red); }

        /* ── ERROR ── */
        .error-message {
            color: var(--red);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            margin-top: 6px;
            display: none;
        }

        /* ── MAIN BUTTON ── */
        .register-button {
            width: 100%;
            padding: 15px;
            background: var(--red);
            border: none;
            border-radius: 2px;
            color: #fff;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            margin-top: 8px;
        }

        .register-button:hover  { background: var(--red-dark); transform: scale(1.01); }
        .register-button:active { transform: scale(0.99); }

        /* ── FOOTER LINK ── */
        .login-link {
            text-align: center;
            margin-top: 28px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .login-link a {
            color: var(--red);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-link a:hover { color: #ff5555; }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .register-container { padding: 36px 24px 32px; }
            h1 { font-size: 2.1rem; }
        }
    </style>
</head>
<body>
    <div class="register-container">

        <div class="logo-row">
            <span class="logo-name">RIVALS<span>.GG</span></span>
            <span class="logo-badge">BETA</span>
        </div>

        <h1>Crear Cuenta</h1>

        <form id="registerForm">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" placeholder="Elige un usuario" required>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <div class="error-message" id="passwordError">Mínimo 8 caracteres</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
                <div class="error-message" id="confirmError">Las contraseñas no coinciden</div>
            </div>

            <div class="form-group">
                <label for="birthDate">Fecha de nacimiento</label>
                <input type="date" id="birthDate" name="birthDate" required>
            </div>

            <button type="submit" class="register-button">Crear cuenta</button>
        </form>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="Iniciar Sesión.html">Inicia sesión</a>
        </div>
    </div>

    <script type="module">
        import { AuthAPI }     from './js/api.js';
        import { saveSession } from './js/auth.js';

        const form            = document.getElementById('registerForm');
        const password        = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const passwordError   = document.getElementById('passwordError');
        const confirmError    = document.getElementById('confirmError');

        password.addEventListener('input', function() {
            passwordError.style.display = (this.value.length > 0 && this.value.length < 8) ? 'block' : 'none';
        });

        confirmPassword.addEventListener('input', function() {
            confirmError.style.display = (this.value.length > 0 && this.value !== password.value) ? 'block' : 'none';
        });

        function showError(msg) {
            let el = document.getElementById('registerApiError');
            if (!el) {
                el = document.createElement('p');
                el.id = 'registerApiError';
                el.style.cssText = 'color:#FF2D2D;font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:600;text-align:center;margin-top:12px;';
                document.querySelector('.register-button').after(el);
            }
            el.textContent = msg;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (password.value.length < 8) { passwordError.style.display = 'block'; return; }
            if (password.value !== confirmPassword.value) { confirmError.style.display = 'block'; return; }

            const btn = document.querySelector('.register-button');
            btn.disabled    = true;
            btn.textContent = 'Creando cuenta...';

            try {
                const { token, user } = await AuthAPI.register({
                    username:  document.getElementById('usuario').value.trim(),
                    email:     document.getElementById('email').value.trim(),
                    password:  password.value,
                    birthDate: document.getElementById('birthDate')?.value || '2000-01-01',
                });
                saveSession(token, user);
                window.location.href = 'Borbuja que se abre despues de iniciar.html';
            } catch (err) {
                showError(err.message);
                btn.disabled    = false;
                btn.textContent = 'Crear cuenta';
            }
        });
    </script>
</body>
</html>
