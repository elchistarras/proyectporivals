<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Rivals.gg</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red:      #FF2D2D;
            --red-dark: #C41A1A;
            --bg:       #0B0B0B;
            --bg2:      #111111;
            --bg3:      #161616;
            --text:     #F0EDE8;
            --muted:    #6B6460;
            --border:   #222;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                repeating-linear-gradient(0deg,  transparent, transparent 59px, #1a1a1a 60px),
                repeating-linear-gradient(90deg, transparent, transparent 59px, #1a1a1a 60px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-top: 3px solid var(--red);
            border-radius: 2px;
            padding: 48px 44px 44px;
            width: 100%;
            max-width: 460px;
            animation: pgFadeIn 0.4s forwards;
        }

        @keyframes pgFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
            justify-content: center;
        }

        .logo-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 0.1em;
            color: var(--text);
            line-height: 1;
        }

        .logo-name span { color: var(--red); }

        .logo-badge {
            background: var(--red);
            color: #fff;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.2em;
            padding: 3px 7px;
            border-radius: 2px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.6rem;
            letter-spacing: 0.04em;
            color: var(--text);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input::placeholder { color: var(--muted); }
        input:focus        { border-color: var(--red); }

        .login-button {
            width: 100%;
            padding: 15px;
            background: var(--red);
            border: none;
            border-radius: 2px;
            color: #fff;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            margin-top: 8px;
        }

        .login-button:hover  { background: var(--red-dark); transform: scale(1.01); }
        .login-button:active { transform: scale(0.99); }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 28px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
        }

        /* ── SOCIAL BUTTONS ── */
        .social-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .btn-social {
            flex: 1;
            padding: 13px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn-social:hover { background: rgba(255,255,255,0.05); }
        .btn-social + .btn-social { border-left: 1px solid var(--border); }
        .btn-social svg { display: block; }

        /* ── FOOTER LINK ── */
        .register-link {
            text-align: center;
            margin-top: 28px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .register-link a {
            color: var(--red);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .register-link a:hover { color: #ff5555; }

        @media (max-width: 480px) {
            .login-container { padding: 36px 24px 32px; }
            h1 { font-size: 2.1rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">

        <div class="logo-row">
            <span class="logo-name">RIVALS<span>.GG</span></span>
            <span class="logo-badge">BETA</span>
        </div>

        <h1>Iniciar Sesión</h1>

        <form id="loginForm">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" placeholder="Tu usuario" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-button">Entrar</button>
        </form>

        <div class="divider"><span>o continúa con</span></div>

        <div class="social-buttons">
            <button class="btn-social" onclick="loginWith('Discord')" title="Continuar con Discord">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="#5865F2" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994.021-.04.001-.088-.041-.104a13.09 13.09 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
            </button>

            <button class="btn-social" onclick="loginWith('Google')" title="Continuar con Google">
                <svg width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
            </button>
        </div>

        <div class="register-link">
            ¿No tienes cuenta? <a href="Crear Cuenta.html">Regístrate</a>
        </div>
    </div>

    <script type="module">
        import { AuthAPI }         from './js/api.js';
        import { saveSession }     from './js/auth.js';

        // Mostrar error en pantalla
        function showError(msg) {
            let el = document.getElementById('loginError');
            if (!el) {
                el = document.createElement('p');
                el.id = 'loginError';
                el.style.cssText = 'color:#FF2D2D;font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:600;text-align:center;margin-top:12px;';
                document.querySelector('.login-button').after(el);
            }
            el.textContent = msg;
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn      = document.querySelector('.login-button');
            const username = document.getElementById('usuario').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled    = true;
            btn.textContent = 'Entrando...';

            try {
                const { token, user } = await AuthAPI.login({ username, password });
                saveSession(token, user);
                window.location.href = 'Borbuja que se abre despues de iniciar.html';
            } catch (err) {
                showError(err.message);
                btn.disabled    = false;
                btn.textContent = 'Entrar';
            }
        });

        function loginWith(provider) {
            alert(`Login con ${provider} — próximamente`);
        }

        window.loginWith = loginWith;
    </script>
</body>
</html>
